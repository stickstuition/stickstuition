<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Rapid Fire maths challenge</title>
  <desc id="desc">A dark Sticks Tuition background with muted equations and mint and red light trails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#121524"/><stop offset=".52" stop-color="#1a1d35"/><stop offset="1" stop-color="#121524"/></linearGradient>
    <radialGradient id="calm"><stop stop-color="#121524" stop-opacity=".95"/><stop offset=".56" stop-color="#121524" stop-opacity=".62"/><stop offset="1" stop-color="#121524" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g fill="none" stroke-linecap="round" filter="url(#blur)" opacity=".42"><path d="M-80 86C180 18 268 196 450 112" stroke="#b9f4de" stroke-width="18"/><path d="M900 650c150-112 292-78 460-190" stroke="#c6001c" stroke-width="20"/><path d="M1030-30c-85 132-24 216 156 302" stroke="#6d4cff" stroke-width="16"/></g>
  <g font-family="Arial,sans-serif" font-weight="700" fill="#fff" opacity=".14"><text x="70" y="155" font-size="76">8 × 7</text><text x="1010" y="130" font-size="70">144 ÷ 12</text><text x="66" y="590" font-size="62">−18 + 42</text><text x="980" y="610" font-size="74">0.75 × 80</text><text x="222" y="342" font-size="45">x²</text><text x="1080" y="370" font-size="54">%</text></g>
  <g fill="none" stroke="#b9f4de" opacity=".16"><circle cx="102" cy="344" r="82" stroke-width="3"/><path d="M34 390 160 272l46 132z" stroke-width="4"/><path d="M1090 290h110v110h-110z" stroke-width="4" transform="rotate(14 1145 345)"/></g>
  <ellipse cx="640" cy="360" rx="390" ry="250" fill="url(#calm)"/>
</svg>
